<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f7f4"/>
      <stop offset="100%" style="stop-color:#e8e4dc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <!-- Factory floor -->
  <rect x="0" y="400" width="800" height="200" fill="#e0dcd4"/>
  <!-- Machine 1 -->
  <rect x="100" y="280" width="140" height="120" rx="6" fill="#d0ccc4" stroke="#bbb5ab" stroke-width="2"/>
  <rect x="120" y="300" width="40" height="30" rx="3" fill="#c4a35a" opacity="0.3"/>
  <rect x="180" y="300" width="40" height="30" rx="3" fill="#c4a35a" opacity="0.3"/>
  <rect x="140" y="200" width="60" height="80" rx="4" fill="#c8c4bc" stroke="#bbb5ab" stroke-width="1.5"/>
  <circle cx="170" cy="220" r="10" fill="#c4a35a" opacity="0.2"/>
  <!-- Machine 2 -->
  <rect x="330" y="250" width="160" height="150" rx="6" fill="#d0ccc4" stroke="#bbb5ab" stroke-width="2"/>
  <rect x="350" y="270" width="120" height="40" rx="4" fill="#c4a35a" opacity="0.2"/>
  <circle cx="410" cy="310" r="30" fill="#c4a35a" opacity="0.08"/>
  <rect x="370" y="200" width="80" height="50" rx="4" fill="#c8c4bc" stroke="#bbb5ab" stroke-width="1.5"/>
  <rect x="380" y="215" width="60" height="20" rx="2" fill="#c4a35a" opacity="0.15"/>
  <!-- Machine 3 -->
  <rect x="570" y="300" width="130" height="100" rx="6" fill="#d0ccc4" stroke="#bbb5ab" stroke-width="2"/>
  <rect x="590" y="320" width="90" height="30" rx="3" fill="#c4a35a" opacity="0.2"/>
  <!-- Conveyor belt -->
  <rect x="50" y="380" width="700" height="20" rx="4" fill="#c4a35a" opacity="0.08" stroke="#c4a35a" stroke-width="1" stroke-dasharray="8 4"/>
  <!-- Handles on wall display -->
  <g transform="translate(680, 200)" opacity="0.15">
    <path d="M0 30 Q0 0 25 0 Q50 0 50 30 Q50 60 25 60 Q0 60 0 30Z" stroke="#1a1a2e" stroke-width="3" fill="none"/>
    <line x1="25" y1="0" x2="25" y2="-15" stroke="#1a1a2e" stroke-width="2"/>
  </g>
  <g transform="translate(720, 180)" opacity="0.12">
    <path d="M0 30 Q0 0 25 0 Q50 0 50 30 Q50 60 25 60 Q0 60 0 30Z" stroke="#1a1a2e" stroke-width="3" fill="none"/>
    <line x1="25" y1="0" x2="25" y2="-15" stroke="#1a1a2e" stroke-width="2"/>
  </g>
  <!-- Light beams -->
  <rect x="200" y="0" width="4" height="200" fill="#c4a35a" opacity="0.06"/>
  <rect x="400" y="0" width="4" height="200" fill="#c4a35a" opacity="0.06"/>
  <rect x="600" y="0" width="4" height="200" fill="#c4a35a" opacity="0.06"/>
  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="4" fill="#c4a35a" opacity="0.15"/>
  <!-- Floor line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#c4a35a" stroke-width="1" opacity="0.15"/>
</svg>
