<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="40%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(196,163,90,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(196,163,90,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="200" y="450" width="1200" height="450" fill="rgba(20,25,50,0.6)"/>
  <rect x="200" y="450" width="1200" height="2" fill="rgba(196,163,90,0.3)"/>
  <!-- Building -->
  <rect x="400" y="250" width="300" height="200" fill="rgba(40,45,70,0.8)" stroke="rgba(196,163,90,0.2)" stroke-width="1"/>
  <rect x="900" y="200" width="350" height="250" fill="rgba(40,45,70,0.8)" stroke="rgba(196,163,90,0.2)" stroke-width="1"/>
  <!-- Windows -->
  <rect x="430" y="280" width="40" height="40" fill="rgba(196,163,90,0.15)"/>
  <rect x="500" y="280" width="40" height="40" fill="rgba(196,163,90,0.15)"/>
  <rect x="570" y="280" width="40" height="40" fill="rgba(196,163,90,0.15)"/>
  <rect x="430" y="350" width="40" height="40" fill="rgba(196,163,90,0.15)"/>
  <rect x="570" y="350" width="40" height="40" fill="rgba(196,163,90,0.15)"/>
  <rect x="930" y="240" width="50" height="50" fill="rgba(196,163,90,0.15)"/>
  <rect x="1020" y="240" width="50" height="50" fill="rgba(196,163,90,0.15)"/>
  <rect x="1110" y="240" width="50" height="50" fill="rgba(196,163,90,0.15)"/>
  <rect x="930" y="320" width="50" height="50" fill="rgba(196,163,90,0.15)"/>
  <rect x="1110" y="320" width="50" height="50" fill="rgba(196,163,90,0.15)"/>
  <!-- Door -->
  <rect x="480" y="380" width="40" height="70" rx="2" fill="rgba(196,163,90,0.1)" stroke="rgba(196,163,90,0.2)" stroke-width="1"/>
  <!-- Glow from windows -->
  <rect x="400" y="250" width="300" height="200" fill="url(#glow)" opacity="0.5"/>
  <rect x="900" y="200" width="350" height="250" fill="url(#glow)" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="450" width="1600" height="450" fill="rgba(10,12,25,0.3)"/>
  <!-- Handle silhouette overlaid -->
  <g transform="translate(700, 480)" opacity="0.08">
    <path d="M-80 50 Q-80 0 -30 0 Q20 0 20 50 Q20 100 -30 100 Q-80 100 -80 50Z" stroke="#fff" stroke-width="4" fill="none"/>
    <rect x="-78" y="30" width="96" height="40" rx="6" stroke="#fff" stroke-width="3" fill="none"/>
  </g>
</svg>
